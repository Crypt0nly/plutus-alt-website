<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e8f6e" />
    <title>PLUTUS — The AI Operating System for Companies</title>
    <meta
      name="description"
      content="PLUTUS is the AI operating system for companies — agents, analytics, orchestration, data, runtime, security and integrations, stocked like a supermarket and rendered in real-time 3D."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230e8f6e'/%3E%3Ctext x='16' y='23' font-family='Arial' font-weight='900' font-size='20' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Real-time WebGL stage -->
    <canvas id="scene" aria-hidden="true"></canvas>
    <div class="grain-overlay" aria-hidden="true"></div>

    <!-- Top navigation -->
    <header class="nav" id="nav">
      <a class="brand" href="#top" aria-label="PLUTUS home">
        <span class="brand-coin">P</span>
        <span class="brand-word">PLUTUS</span>
      </a>
      <nav class="nav-links" id="nav-links" aria-label="Aisles"></nav>
      <div class="nav-actions">
        <button class="btn btn-ghost" id="nav-aisles">Browse aisles</button>
        <a class="btn btn-solid" href="#checkout">Get a quote</a>
      </div>
    </header>

    <!-- Scroll content (overlays the fixed canvas) -->
    <main id="scroll"></main>

    <!-- Side navigation dock -->
    <aside class="dock" id="dock" aria-label="Section navigation"></aside>

    <!-- Product detail sheet -->
    <div class="sheet-scrim" id="sheet-scrim" hidden></div>
    <section class="sheet" id="sheet" aria-hidden="true" aria-label="Product details"></section>

    <!-- Loader -->
    <div class="loader" id="loader">
      <div class="loader-coin">P</div>
      <div class="loader-word">PLUTUS</div>
      <div class="loader-bar"><i id="loader-fill"></i></div>
      <div class="loader-note" id="loader-note">Stocking the shelves…</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
